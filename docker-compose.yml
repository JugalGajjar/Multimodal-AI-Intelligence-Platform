name: mmap

networks:
  mmap-net:
    driver: bridge

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  minio-data:

services:

  # ----------------------------------------------------------
  # Frontend — Next.js
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mmap-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - mmap-net

  # ----------------------------------------------------------
  # Backend — FastAPI
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mmap-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.localhost`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    networks:
      - mmap-net

  # ----------------------------------------------------------
  # Reverse proxy
  # ----------------------------------------------------------
  traefik:
    image: traefik:v3.6
    container_name: mmap-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=mmap_mmap-net"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard
    volumes:
      # On macOS use ${HOME}/.docker/run/docker.sock (Docker Desktop's real socket).
      # On Linux use /var/run/docker.sock. Override via DOCKER_SOCK in .env.
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - mmap-net

  # ----------------------------------------------------------
  # Relational DB — users, metadata, conversations, reports
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mmap_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mmap}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mmap} -d ${POSTGRES_DB:-mmap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mmap-net

  # ----------------------------------------------------------
  # Vector DB — RAG embeddings
  # ----------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: mmap-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mmap-net

  # ----------------------------------------------------------
  # Cache + queue + rate limiting
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mmap-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mmap-net

  # ----------------------------------------------------------
  # Knowledge graph
  # ----------------------------------------------------------
  neo4j:
    image: neo4j:5.24-community
    container_name: mmap-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - mmap-net

  # ----------------------------------------------------------
  # Object storage (self-hosted S3)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: mmap-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - mmap-net

  # Creates the default bucket on first boot
  minio-init:
    image: minio/mc:latest
    container_name: mmap-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin_dev}" &&
        mc mb --ignore-existing "local/${MINIO_BUCKET:-mmap-uploads}" &&
        echo "Bucket ready: ${MINIO_BUCKET:-mmap-uploads}"
    networks:
      - mmap-net
