# Fly.io config for the arq worker.
# Deploy:  fly deploy --config fly.worker.toml
# Shares secrets with mmap-backend — set them on this app too.

app = "mmap-worker"
primary_region = "iad"

[build]
dockerfile = "Dockerfile.worker.prod"

[env]
APP_ENV = "production"
APP_DEBUG = "false"
OTEL_ENABLED = "false"

# The worker is queue-driven — no inbound HTTP. Keep at least 1 machine
# running so the arq loop is always polling.
[[vm]]
size = "shared-cpu-2x"
memory = "2gb"

[processes]
worker = "arq app.workers.config.WorkerSettings"

# Always-on: workers can't auto-stop without losing in-flight jobs.
[deploy]
strategy = "rolling"
