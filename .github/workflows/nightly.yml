name: nightly — integration + e2e

# Brings the full container stack up and runs the slow tests that need it.
# Triggered on every push to main, nightly at 03:17 UTC, and on demand.
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: backend integration (docker compose stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OTEL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Compose up (dev stack)
        run: |
          cp .env.example .env
          # traefik is needed by test_infra.py (dashboard + host-header routes).
          docker compose up -d postgres redis qdrant neo4j minio minio-init backend worker traefik

      - name: Wait for stack to be healthy
        run: |
          for i in $(seq 1 60); do
            healthy=$(docker compose ps --format '{{.State}} {{.Health}}' | grep running | grep -c healthy || true)
            echo "healthy services so far: $healthy"
            if [ "$healthy" -ge 5 ]; then exit 0; fi
            sleep 5
          done
          docker compose ps
          docker compose logs backend
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install host-side test deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest integration
        working-directory: backend
        env:
          POSTGRES_HOST: 127.0.0.1
          REDIS_HOST: 127.0.0.1
          QDRANT_HOST: 127.0.0.1
          MINIO_ENDPOINT: 127.0.0.1:9000
          NEO4J_URI: bolt://127.0.0.1:7687
        run: pytest -q tests/integration

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs --tail 200 backend worker

  e2e:
    name: e2e (Playwright against dev stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Compose up (dev stack)
        run: |
          cp .env.example .env
          docker compose up -d

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:3000 || true)
            echo "frontend: $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          docker compose ps
          docker compose logs frontend
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Playwright deps
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Warm up worker (download embedding model)
        # First upload triggers a ~100 MB HF download. Warm it up before e2e
        # so per-test timeouts don't eat the cold start.
        run: |
          set -e
          EMAIL="warmup-$(date +%s)@evalbot.io"
          PASS="WarmupP@ss123"
          API=http://localhost:8000/api/v1

          curl -sf -X POST "$API/auth/register" \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}" > /dev/null
          TOKEN=$(curl -sf -X POST "$API/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}" | jq -r .access_token)

          echo "warming up worker" > /tmp/warmup.txt
          DOC_ID=$(curl -sf -X POST "$API/documents" \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@/tmp/warmup.txt;type=text/plain" | jq -r .id)

          for i in $(seq 1 60); do
            STATUS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
              "$API/documents/$DOC_ID" | jq -r .status)
            echo "warmup status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "processed" ]; then exit 0; fi
            if [ "$STATUS" = "failed" ]; then
              docker compose logs worker --tail 200
              exit 1
            fi
            sleep 5
          done
          echo "::error::worker warmup timed out after 5 minutes"
          docker compose logs worker --tail 200
          exit 1

      - name: Run Playwright
        run: npx playwright test --reporter=line

      - name: Dump backend + worker logs on failure
        if: failure()
        run: docker compose logs --tail 300 backend worker

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
