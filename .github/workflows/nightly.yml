name: nightly — integration + e2e

# Brings the full container stack up and runs the slow tests that need it.
# Triggered on every push to main, nightly at 03:17 UTC, and on demand.
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: backend integration (docker compose stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OTEL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          # GitHub Actions runners ship with ~14 GB free; torch pulls in
          # CUDA libs (cudnn, triton, cusparse) we don't use, ENOSPC'ing
          # the [dev] install. Drop preinstalled tooling we don't need.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/share/swift \
                      /usr/local/share/powershell /usr/local/share/chromium
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - name: Compose up (dev stack)
        run: |
          cp .env.example .env
          sed -i 's/^OTEL_ENABLED=.*/OTEL_ENABLED=false/' .env
          # Tests register many users from the same runner IP — rate limit
          # would 429 the suite after a handful of attempts.
          sed -i 's/^RATE_LIMIT_ENABLED=.*/RATE_LIMIT_ENABLED=false/' .env
          # Pull base images with retries — Docker Hub on GitHub-hosted
          # runners occasionally times out reaching registry-1.docker.io.
          for attempt in 1 2 3; do
            if docker compose pull --quiet; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "::error::docker compose pull failed after 3 attempts"
              exit 1
            fi
            echo "pull failed (attempt $attempt/3); retrying in $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          docker compose up -d

      - name: Wait for stack to be healthy
        run: |
          for i in $(seq 1 60); do
            healthy=$(docker compose ps --format '{{.State}} {{.Health}}' | grep running | grep -c healthy || true)
            echo "healthy services so far: $healthy"
            if [ "$healthy" -ge 5 ]; then exit 0; fi
            sleep 5
          done
          docker compose ps
          docker compose logs backend
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install host-side test deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest integration
        working-directory: backend
        env:
          POSTGRES_HOST: 127.0.0.1
          REDIS_HOST: 127.0.0.1
          QDRANT_HOST: 127.0.0.1
          MINIO_ENDPOINT: 127.0.0.1:9000
          NEO4J_URI: bolt://127.0.0.1:7687
        run: pytest -q tests/integration

      - name: Dump backend logs on failure
        if: failure()
        run: |
          echo "::group::backend logs"
          docker compose logs --tail 400 backend
          echo "::endgroup::"
          echo "::group::worker logs"
          docker compose logs --tail 800 worker
          echo "::endgroup::"
          echo "::group::compose ps"
          docker compose ps
          echo "::endgroup::"

  e2e:
    name: e2e (Playwright against dev stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          # See the integration job for the rationale — torch + CUDA libs
          # plus npm/playwright deps overflow the 14 GB default.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/share/swift \
                      /usr/local/share/powershell /usr/local/share/chromium
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - name: Compose up (dev stack)
        run: |
          cp .env.example .env
          sed -i 's/^OTEL_ENABLED=.*/OTEL_ENABLED=false/' .env
          # Tests register many users from the same runner IP — rate limit
          # would 429 the suite after a handful of attempts.
          sed -i 's/^RATE_LIMIT_ENABLED=.*/RATE_LIMIT_ENABLED=false/' .env
          docker compose up -d

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:3000 || true)
            echo "frontend: $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          docker compose ps
          docker compose logs frontend
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Playwright deps
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Warm up worker (download embedding model)
        # First upload triggers a ~100 MB HF download. Warm it up before e2e
        # so per-test timeouts don't eat the cold start.
        run: |
          set -e
          EMAIL="warmup-$(date +%s)@evalbot.io"
          PASS="WarmupP@ss1"
          API=http://localhost:8000/api/v1

          # Register and extract the dev verification code (only returned
          # when RESEND_API_KEY is unset — i.e. CI/local).
          REG=$(curl -sf -X POST "$API/auth/register" \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\",\"first_name\":\"Warmup\",\"last_name\":\"Bot\"}")
          CODE=$(echo "$REG" | jq -r .dev_verification_code)
          if [ -z "$CODE" ] || [ "$CODE" = "null" ]; then
            echo "::error::register did not return dev_verification_code — RESEND_API_KEY may be set in CI?"
            exit 1
          fi

          # Verify the account; this hands back an access_token directly.
          TOKEN=$(curl -sf -X POST "$API/auth/verify-email" \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$EMAIL\",\"code\":\"$CODE\"}" | jq -r .access_token)

          echo "warming up worker" > /tmp/warmup.txt
          DOC_ID=$(curl -sf -X POST "$API/documents" \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@/tmp/warmup.txt;type=text/plain" | jq -r .id)

          for i in $(seq 1 60); do
            STATUS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
              "$API/documents/$DOC_ID" | jq -r .status)
            echo "warmup status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "processed" ]; then exit 0; fi
            if [ "$STATUS" = "failed" ]; then
              docker compose logs worker --tail 200
              exit 1
            fi
            sleep 5
          done
          echo "::error::worker warmup timed out after 5 minutes"
          docker compose logs worker --tail 200
          exit 1

      - name: Run Playwright
        run: npx playwright test --reporter=line

      - name: Dump backend + worker logs on failure
        if: failure()
        run: |
          echo "::group::backend logs"
          docker compose logs --tail 400 backend
          echo "::endgroup::"
          echo "::group::worker logs"
          docker compose logs --tail 800 worker
          echo "::endgroup::"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
